<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <title>Frontend Mentor | Results summary component</title>
  
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
</head>
<body>
  <main>
    <article class="summary">
      <section class="summary__result">
        <h3 class="summary__result-title">Your Result</h3>
        <h1 class="summary__result-score"><span>76</span> of 100</h1>
        <h2 class="summary__result-feedback">Great</h2>
        <p class="summary__result-comparison">You scored higher than 65% of the people who have taken these tests.</p>
      </section>
      <section class="summary__details">
        <h3 class="summary__details-title">Summary</h3>
        <ul class="summary__details-list">
          <li class="summary__details-item summary__details-item--reaction">
            <p class="summary__details-item-title">Reaction</p>
            <p class="summary__details-item-score"><span>80</span> / 100</p>
          </li>
          <li class="summary__details-item summary__details-item--memory">
            <p class="summary__details-item-title">Memory</p>
            <p class="summary__details-item-score"><span>92</span> / 100</p>
          </li>
          <li class="summary__details-item summary__details-item--verbal">
            <p class="summary__details-item-title">Verbal</p>
            <p class="summary__details-item-score"><span>61</span> / 100</p>
          </li>
          <li class="summary__details-item summary__details-item--visual">
            <p class="summary__details-item-title">Visual</p>
            <p class="summary__details-item-score"><span>72</span> / 100</p>
          </li>
        </ul>
        <button type="button" class="btn" id="continue">Continue</button>
      </section>
    </article>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
